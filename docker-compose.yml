version: '3.9'

services:
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  celery-worker:
    build: .
    command: celery -A config worker --loglevel=info
    env_file:
      - .env
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A config beat --loglevel=info
    env_file:
      - .env
    restart: unless-stopped
